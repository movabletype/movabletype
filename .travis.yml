dist: bionic
os:
  - linux
language: ruby
services:
  - docker

jobs:
  include:
    - # Perl 5.28 / PHP 7.3 / MariaDB 10.3
      if: type != cron
      env: TEST_IMAGE_NAME="buster" TEST_COMMAND="prove t/*.t || prove --state faild"
    - if: type != cron
      env: TEST_IMAGE_NAME="buster" TEST_COMMAND="prove t/mt7/[^t]* || prove --state faild"
    - if: type != cron
      env: TEST_IMAGE_NAME="buster" TEST_COMMAND="prove t/mt7/t* || prove --state faild"
    - if: type != cron
      env: TEST_IMAGE_NAME="buster" TEST_COMMAND="prove t/app/ t/class/ t/cms/ t/model/ t/mt_object/ t/object_driver/ t/task/ t/template/ t/tools t/util/"
    - if: type != cron
      env: TEST_IMAGE_NAME="buster" TEST_COMMAND="prove t/cms_permission/ || prove --state faild"
    - if: type != cron
      env: TEST_IMAGE_NAME="buster" TEST_COMMAND="prove t/data_api/ || prove --state faild"
    - if: type != cron
      env: TEST_IMAGE_NAME="buster" TEST_COMMAND="prove t/tag/ || prove --state faild"
    - if: type != cron
      env: TEST_IMAGE_NAME="buster" TEST_COMMAND="prove t/selenium/*.t || prove --state faild" USE_SELENIUM=1
    - if: type != cron
      env: TEST_IMAGE_NAME="buster" TEST_COMMAND="prove plugins/*/t || prove --state faild"
    - if: type != cron
      env: TEST_IMAGE_NAME="buster" TEST_COMMAND="phpunit && make test-php-lint"

    - # Perl 5.30 / PHP 7.4 / MySQL 8.0
      if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="fedora" TEST_COMMAND="MT_TEST_RUN_APP_AS_CGI=1 sh -c 'prove t/*.t || prove --state faild'"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="fedora" TEST_COMMAND="MT_TEST_RUN_APP_AS_CGI=1 sh -c 'prove t/mt7/[^t]* || prove --state faild'"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="fedora" TEST_COMMAND="MT_TEST_RUN_APP_AS_CGI=1 sh -c 'prove t/mt7/t* || prove --state faild'"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="fedora" TEST_COMMAND="MT_TEST_RUN_APP_AS_CGI=1 sh -c 'prove t/app/ t/class/ t/cms/ t/model/ t/mt_object/ t/object_driver/ t/task/ t/template/ t/tools t/util/ || prove --state faild'"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="fedora" TEST_COMMAND="MT_TEST_RUN_APP_AS_CGI=1 sh -c 'prove t/cms_permission/ || prove --state faild'"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="fedora" TEST_COMMAND="MT_TEST_RUN_APP_AS_CGI=1 sh -c 'prove t/data_api/ || prove --state faild'"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="fedora" TEST_COMMAND="MT_TEST_RUN_APP_AS_CGI=1 sh -c 'prove t/tag/ || prove --state faild'"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="fedora" TEST_COMMAND="MT_TEST_RUN_APP_AS_CGI=1 sh -c 'prove plugins/*/t || prove --state faild'"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="fedora" TEST_COMMAND="phpunit && make test-php-lint"

    - # Perl 5.20 / PHP 5.6 / MySQL 5.5
      if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="jessie" TEST_COMMAND="prove t/*.t || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="jessie" TEST_COMMAND="prove t/mt7/[^t]* || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="jessie" TEST_COMMAND="prove t/mt7/t* || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="jessie" TEST_COMMAND="prove t/app/ t/class/ t/cms/ t/model/ t/mt_object/ t/object_driver/ t/task/ t/template/ t/tools t/util/ || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="jessie" TEST_COMMAND="prove t/cms_permission/ || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="jessie" TEST_COMMAND="prove t/data_api/ || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="jessie" TEST_COMMAND="prove t/tag/ || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="jessie" TEST_COMMAND="prove plugins/*/t || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="jessie" TEST_COMMAND="phpunit && make test-php-lint"

    - # 5.10 / PHP 5.3 / MySQL 5.1
      if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="centos6" TEST_COMMAND="prove t/*.t || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="centos6" TEST_COMMAND="prove t/mt7/[^t]* || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="centos6" TEST_COMMAND="prove t/mt7/t* || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="centos6" TEST_COMMAND="prove t/app/ t/class/ t/cms/ t/model/ t/mt_object/ t/object_driver/ t/task/ t/template/ t/tools t/util/ || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="centos6" TEST_COMMAND="prove t/cms_permission/ || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="centos6" TEST_COMMAND="prove t/data_api/ || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="centos6" TEST_COMMAND="prove t/tag/ || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="centos6" TEST_COMMAND="prove plugins/*/t || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="centos6" TEST_COMMAND="phpunit && make test-php-lint"

    - # Perl 5.32 / PHP 7.4 / MariaDB 10.5
      if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="bullseye" TEST_COMMAND="prove t/*.t || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="bullseye" TEST_COMMAND="prove t/mt7/[^t]* || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="bullseye" TEST_COMMAND="prove t/mt7/t* || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="bullseye" TEST_COMMAND="prove t/app/ t/class/ t/cms/ t/model/ t/mt_object/ t/object_driver/ t/task/ t/template/ t/tools t/util/ || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="bullseye" TEST_COMMAND="prove t/cms_permission/ || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="bullseye" TEST_COMMAND="prove t/data_api/ || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="bullseye" TEST_COMMAND="prove t/tag/ || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="bullseye" TEST_COMMAND="prove plugins/*/t || prove --state faild"
    - if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="bullseye" TEST_COMMAND="phpunit && make test-php-lint"

    - # no need to run extra tests under various environments
      if: (type = cron AND (branch = master OR branch = develop OR branch =~ /^support-/ OR branch =~ /^release-/)) OR branch =~ /cron/
      env: TEST_IMAGE_NAME="bullseye" TEST_COMMAND="prove xt || prove --state faild"
#    - if: (type = cron
